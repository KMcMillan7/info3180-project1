{% extends "base.html" %} {% block main %}
<h1 class="mb-4">Properties</h1>
<div class="row">
  {% for property in properties %}
  <div class="col-md-4 mb-4">
    <div class="card h-100">
      <img
        src="{{ url_for('static', filename='uploads/' + property.photo_filename) }}"
        class="card-img-top"
        alt="{{ property.title }}"
        style="height: 200px; object-fit: cover"
      />
      <div class="card-body">
        <h5 class="card-title">{{ property.title }}</h5>
        <p class="card-text">{{ property.location }}</p>
        <p class="card-text">
          <strong
            >{{ property.currency }} ${{ "{:,.2f}".format(property.price)
            }}</strong
          >
        </p>
        <a
          href="{{ url_for('main.view_property', property_id=property.id) }}"
          class="btn btn-primary"
          >View Details</a
        >
      </div>
    </div>
  </div>
  {% else %}
  <p>No properties found.</p>
  {% endfor %}
</div>
{% endblock %}
